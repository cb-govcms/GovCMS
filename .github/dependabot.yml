version: 2
updates:
- package-ecosystem: composer
  directory: "/"
  ignore:
    - dependency-name: "drupal/core*"
      update-types: ["version-update:semver-major"]
  groups:
    drupal-core:
      patterns:
        - "drupal/core*"
  schedule:
    interval: daily
    time: "16:00"
    timezone: "Australia/Sydney"
  open-pull-requests-limit: 30
  target-branch: 4.x-develop
